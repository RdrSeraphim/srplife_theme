{{ define "main" }}
<div class="container">
	<article class="cde-window">
		<div class="cde-resize-handle cde-resize-handle-tl"></div>
		<div class="cde-resize-handle cde-resize-handle-tr"></div>
		<div class="cde-resize-handle cde-resize-handle-bl"></div>
		<div class="cde-resize-handle cde-resize-handle-br"></div>

		<!-- Bezels -->
		<div class="cde-bezel cde-bezel-top"></div>
		<div class="cde-bezel cde-bezel-bottom"></div>
		<div class="cde-bezel cde-bezel-left"></div>
		<div class="cde-bezel cde-bezel-right"></div>
		<div class="cde-title-bar">
			<div class="cde-controls-left">
				<div class="cde-window-btn cde-btn-menu"></div>
			</div>
			<div class="cde-title-text">
				~/content/pages/{{ .File.ContentBaseName }}/index.md <a href="https://github.com/RdrSeraphim/rdrseraphim.github.io/blob/main/content/pages/{{ .File.ContentBaseName }}/index.md">[src]</a>
			</div>
			<div class="cde-controls-right">
				<div class="cde-window-btn cde-btn-minimize"></div>
				<div class="cde-window-btn cde-btn-maximize"></div>
				<a href="{{ .Site.BaseURL | relURL }}"></a>
				<div class="cde-window-btn cde-btn-close"></div>
			</a>
		</div>
	</div>
	<div class="cde-window-content">
		{{ if ne (.Params.show_title_and_feature_image | default true) false }}
			<header class="post-header">
				<h1 class="post-title">{{ .Title }}</h1>

				{{ with .Params.feature_image }}
					<figure class="post-image">
						<img src="{{ . }}" alt="{{ $.Title }}" style="
							width: 100%;
							height: auto;
							border: 2px solid var(--cde-border-dark);
							border-bottom-color: var(--cde-border-light);
							border-right-color: var(--cde-border-light);
							margin: 20px 0;
							" />
					</figure>
				{{ end }}
			</header>
		{{ end }}

		<section class="gh-content">{{ .Content }}</section>
	</div>
</article>
</div>
{{ end }}
